baseURL = "https://example.org/"
languageCode = "en-us"
title = "Darby"

[module]
  [[module.imports]]
    path = "github.com/aktech/darby"

[params]
  accent = "#331c74"
  accentDark = "#a78bfa"
  repo = "https://github.com/aktech/darby"
  logo = "/darby-logo.png"
  logoHeight = "2rem"
  postTitleSize = "2.6rem"
  postTitleFont = "Playfair Display, serif"
  favicon = "/favicon.png"
  editURL = "https://github.com/darby/docs/edit/main/exampleSite/content/"
  showLastUpdated = true

  # Fonts are given as full CSS stacks. The theme fetches the first family of
  # each from Google Fonts and skips generic / system names (serif, system-ui).
  [params.fonts]
    body = "Inter, system-ui, sans-serif"
    heading = "Space Grotesk, sans-serif"
    mono = "Fira Code, ui-monospace, monospace"

  [[params.tabs]]
    name = "Docs"
    url = "/docs/"
  [[params.tabs]]
    name = "Guides"
    url = "/guides/"
  [[params.tabs]]
    name = "Reference"
    url = "/reference/"
  [[params.tabs]]
    name = "Blog"
    url = "/blog/"

  # Extra links in the top bar, alongside the action icons. A link with `url` is
  # a plain link (external URLs open in a new tab). A link with a nested `links`
  # list becomes an animated dropdown; each child may set an `icon` (names from
  # the feature-icon set, e.g. rocket, config, code, pencil).
  [[params.navLinks]]
    name = "Resources"
    [[params.navLinks.links]]
      name = "Quickstart"
      url = "/docs/quickstart/"
      icon = "rocket"
    [[params.navLinks.links]]
      name = "Configuration"
      url = "/docs/configuration/"
      icon = "config"
    [[params.navLinks.links]]
      name = "Shortcodes"
      url = "/reference/shortcodes/"
      icon = "code"
  [[params.navLinks]]
    name = "Community"
    url = "https://discourse.gohugo.io/"

  [[params.versions]]
    name = "v2.0"
    url = "/"
    current = true
  [[params.versions]]
    name = "v1.0"
    url = "/v1/"

  [params.search]
    enable = true
    backend = "fuse"

  # Ask Assistant: client-side docs Q&A. Default backend runs the model fully
  # in the browser (no server, no API key). The index is built in CI by
  # `npm run build-index` and shipped as a static file.
  [params.assistant]
    enable = true
    backend = "browser"   # "browser" (default, no backend) or "hosted"
    indexPath = "assistant-index.json"
    suggestions = [
      "How do I change the accent color?",
      "How do I deploy the site to GitHub Pages?",
      "How do I add a Mermaid diagram?",
    ]
    # For a hosted OpenAI-compatible backend instead (optional):
    # backend = "hosted"
    # [params.assistant.hosted]
    #   baseURL = "https://api.openai.com/v1"
    #   model = "gpt-4o-mini"
    #   apiKey = ""   # exposed to the browser; use only for local/proxied servers

  [[params.social]]
    name = "github"
    url = "https://github.com/aktech/darby"
  [[params.social]]
    name = "x"
    url = "https://x.com/iaktech"
  [[params.social]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/iaktech/"

  [params.footer]
    copyright = "© 2026 Darby. MIT Licensed."
    # Bottom-bar credit. Both label and URL are customizable; set
    # hidePoweredBy = true to remove it entirely.
    poweredBy = "Darby"
    poweredByURL = "https://github.com/aktech/darby"

    [[params.footer.columns]]
      title = "Product"
      [[params.footer.columns.links]]
        name = "Quickstart"
        url = "/docs/quickstart/"
      [[params.footer.columns.links]]
        name = "Installation"
        url = "/docs/installation/"
    [[params.footer.columns]]
      title = "Resources"
      [[params.footer.columns.links]]
        name = "Guides"
        url = "/guides/"
      [[params.footer.columns.links]]
        name = "Reference"
        url = "/reference/"
      [[params.footer.columns.links]]
        name = "Blog"
        url = "/blog/"
    [[params.footer.columns]]
      title = "Community"
      [[params.footer.columns.links]]
        name = "GitHub"
        url = "https://github.com/aktech/darby"
      [[params.footer.columns.links]]
        name = "Hugo"
        url = "https://gohugo.io/"

[outputs]
  home = ["HTML", "RSS", "JSON"]

# Hugo does not merge a theme's [markup] config into a consuming site
# (the markup key is _merge: none), so adopters must set these themselves.
# This block is the reference config the theme is designed for.
[markup]
  [markup.highlight]
    noClasses = false
    lineNos = false
    codeFences = true
    guessSyntax = true
  [markup.goldmark.parser.attribute]
    block = true
    title = true
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
