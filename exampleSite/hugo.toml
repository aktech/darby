baseURL = "https://example.org/"
languageCode = "en-us"
title = "Darby"

[module]
  [[module.imports]]
    path = "github.com/aktech/darby"

[params]
  accent = "#331c74"
  accentDark = "#a78bfa"
  repo = "https://github.com/aktech/darby"
  logo = "/darby-logo.png"
  favicon = "/favicon.png"
  editURL = "https://github.com/darby/docs/edit/main/exampleSite/content/"
  showLastUpdated = true

  [[params.tabs]]
    name = "Docs"
    url = "/docs/"
  [[params.tabs]]
    name = "Guides"
    url = "/guides/"
  [[params.tabs]]
    name = "Reference"
    url = "/reference/"

  [[params.versions]]
    name = "v2.0"
    url = "/"
    current = true
  [[params.versions]]
    name = "v1.0"
    url = "/v1/"

  [params.search]
    enable = true
    backend = "fuse"

  [params.footer]
    text = "Copyright Darby, Inc."

[outputs]
  home = ["HTML", "RSS", "JSON"]

# Hugo does not merge a theme's [markup] config into a consuming site
# (the markup key is _merge: none), so adopters must set these themselves.
# This block is the reference config the theme is designed for.
[markup]
  [markup.highlight]
    noClasses = false
    lineNos = false
    codeFences = true
    guessSyntax = true
  [markup.goldmark.parser.attribute]
    block = true
    title = true
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
