{{ define "main" }}
<div class="post-layout">
  <article class="doc post">
    <header class="post-header">
      <h1>{{ .Title }}</h1>
      {{ partial "post-meta.html" . }}
    </header>
    {{ .Content }}
    {{ with .Params.tags }}
    <footer class="post-tags">
      {{ range . }}<a class="post-tag" href="{{ "/tags/" | relLangURL }}{{ . | urlize }}/">{{ . }}</a>{{ end }}
    </footer>
    {{ end }}
  </article>
  <div class="toc-col">{{ partial "toc.html" . }}</div>
</div>
{{ end }}
