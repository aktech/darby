{{ define "main" }}
<div class="post-layout">
  <article class="doc post post-index">
    <header class="post-header">
      <h1>{{ .Title }}</h1>
      {{ with .Content }}<div class="blog-intro">{{ . }}</div>{{ end }}
    </header>
    <ul class="post-list">
      {{ range .Pages.ByDate.Reverse }}
      <li class="post-list-item">
        <h2 class="post-list-title"><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
        {{ partial "post-meta.html" . }}
        {{ with .Summary }}<p class="post-summary">{{ . }}</p>{{ end }}
      </li>
      {{ end }}
    </ul>
  </article>
</div>
{{ end }}
