<header class="topbar">
  <button class="hamburger" data-sidebar-toggle aria-label="Open navigation">
    <svg width="20" height="20" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
  </button>
  <a class="brand" href="{{ .Site.Home.RelPermalink }}">
    {{ with .Site.Params.logo }}<img src="{{ . | relURL }}" alt="{{ $.Site.Title }}" class="brand-logo light-only">{{ end }}
    {{ with .Site.Params.logoDark }}<img src="{{ . | relURL }}" alt="" class="brand-logo dark-only">{{ end }}
    <span class="brand-name">{{ .Site.Title }}</span>
  </a>
  <div class="topbar-right">
    {{ with .Site.Params.repo }}<a class="topbar-link" href="{{ . }}" aria-label="Repository">GitHub</a>{{ end }}
    {{ partial "theme-toggle.html" . }}
  </div>
</header>
