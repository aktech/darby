<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
{{ with .Site.Params.favicon }}<link rel="icon" href="{{ partial "url.html" . }}">
<link rel="apple-touch-icon" href="{{ partial "url.html" . }}">{{ end }}
{{/* no-flash: set theme before paint */}}
<script>
(function(){try{var t=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);}catch(e){}})();
</script>
{{ with .Site.GetPage "/blog" }}{{ with .OutputFormats.Get "rss" }}<link rel="alternate" type="application/rss+xml" title="{{ $.Site.Title }} Blog" href="{{ .Permalink }}">{{ end }}{{ end }}
{{ partial "fonts.html" . }}
{{ partial "css.html" . }}
