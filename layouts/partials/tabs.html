{{ with .Site.Params.tabs }}
<nav class="nav-tabs" aria-label="Sections">
  {{ range . }}
    {{ $href := partial "url.html" .url }}
    {{ $active := hasPrefix $.RelPermalink $href }}
    <a class="nav-tab{{ if $active }} active{{ end }}" href="{{ $href }}">{{ .name }}</a>
  {{ end }}
</nav>
{{ end }}
