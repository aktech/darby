{{/* Rendered at <body> level (NOT inside .topbar) so position:fixed resolves
     against the viewport. The topbar's backdrop-filter would otherwise become
     the containing block and trap the overlay inside the header strip. */}}
<div class="search-modal" id="search-modal" hidden>
  <div class="search-box" role="dialog" aria-modal="true" aria-label="Search">
    <div class="search-field">
      <svg class="search-field-icon" width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="search" class="search-input" data-search-input placeholder="{{ i18n "search_placeholder" }}" autocomplete="off" aria-label="{{ i18n "search_placeholder" }}">
      <button type="button" class="search-close" data-search-close aria-label="Close search"><svg width="16" height="16" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    </div>
    <ul class="search-results" data-search-results role="listbox"></ul>
    <div class="search-foot">
      <span><kbd>&uarr;</kbd><kbd>&darr;</kbd> navigate</span>
      <span><kbd>&crarr;</kbd> select</span>
      <span><kbd>esc</kbd> close</span>
    </div>
  </div>
</div>
