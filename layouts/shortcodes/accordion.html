{{- $title := .Get "title" | default "Details" -}}
<details class="accordion"{{ if .Get "open" }} open{{ end }}>
  <summary class="accordion-summary">
    {{ $title }}
    <svg class="accordion-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
  </summary>
  <div class="accordion-body">{{ .Page.RenderString (dict "display" "block") .Inner }}</div>
</details>
