{{- /* External links open in a new tab, get rel safety + a small icon. */ -}}
{{- $ext := or (hasPrefix .Destination "http://") (hasPrefix .Destination "https://") -}}
{{- $href := partial "internal-url.html" .Destination -}}
<a href="{{ $href | safeURL }}"{{ with .Title }} title="{{ . }}"{{ end }}{{ if $ext }} target="_blank" rel="noopener noreferrer"{{ end }}>
  {{- .Text | safeHTML -}}
  {{- if $ext }}<svg class="external-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M7 17 17 7M8 7h9v9"/></svg>{{ end -}}
</a>
